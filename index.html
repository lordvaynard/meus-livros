        const container = document.getElementById('lista-livros');

        function abrirImagem(url) {
            const modal = document.getElementById('modal-imagem');
            const imgAmpliada = document.getElementById('imagem-ampliada');
            imgAmpliada.src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharImagem() {
            const modal = document.getElementById('modal-imagem');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        livros.forEach(livro => {
            const mensagem = encodeURIComponent(`Olá Beatriz! Tenho interesse no livro: ${livro.titulo}`);
            const linkWhatsapp = `https://wa.me/5535984278427?text=${mensagem}`;

            const card = `
                <div class="book-card bg-white rounded-2xl overflow-hidden flex flex-col">
                    <div class="card-img-container cursor-zoom-in" onclick="abrirImagem('${livro.imagem}')">
                        <img src="${livro.imagem}" alt="${livro.titulo}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <span class="text-emerald-600 text-xs font-bold uppercase tracking-widest mb-1">${livro.autor}</span>
                        <h2 class="text-xl font-bold mb-3 leading-tight h-14 overflow-hidden text-gray-800">${livro.titulo}</h2>
                        <div class="bg-emerald-50 p-2 rounded-lg mb-4">
                            <p class="text-emerald-800 text-xs italic"><strong>Estado:</strong> ${livro.estado || 'Bom estado'}</p>
                        </div>
                        <div class="mt-auto">
                            <p class="price-tag mb-4">${livro.preco ? 'R$ ' + livro.preco : 'A combinar'}</p>
                            <a href="${linkWhatsapp}" target="_blank" class="btn-whatsapp block text-center w-full py-3 rounded-xl text-white font-bold shadow-lg shadow-emerald-200">
                                Tenho interesse
                            </a>
                        </div>
                    </div>
                </div>
            `;
