<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Estante | Beatriz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="header-gradient text-white py-12 shadow-inner">
        <div class="container mx-auto text-center px-4">
            <h1 class="text-5xl font-extrabold tracking-tight">Minha Estante</h1>
            <p class="mt-3 text-emerald-100 text-lg max-w-2xl mx-auto italic">
                Catálogo de desapegos da minha coleção particular.
            </p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div id="lista-livros" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="modal-imagem" class="fixed inset-0 z-50 bg-emerald-950/90 flex items-center justify-center p-4" onclick="fecharImagem()">
        <button onclick="fecharImagem()" class="close-btn absolute top-5 right-8 text-white text-5xl font-light">&times;</button>
        <img id="imagem-ampliada" src="" alt="Ampliada" class="max-w-full max-h-[90vh] rounded shadow-2xl border-4 border-white/10" onclick="event.stopPropagation()">
    </div>

    <footer class="bg-white border-t py-12 mt-12">
        <div class="container mx-auto text-center">
            <p class="text-gray-400 text-sm uppercase tracking-widest">&copy; 2026 Catálogo de Livros da Beatriz</p>
        </div>
    </footer>

    <script>
        const container = document.getElementById('lista-livros');

        // Função para carregar os livros do arquivo JSON
        async function carregarLivros() {
            try {
                const resposta = await fetch('livros.json');
                const livros = await resposta.json();
                renderizarLivros(livros);
            } catch (erro) {
                console.error("Erro ao carregar o arquivo JSON:", erro);
                container.innerHTML = "<p class='text-center col-span-full text-red-500'>Erro ao carregar o catálogo. Verifique o arquivo livros.json.</p>";
            }
        }

        function renderizarLivros(lista) {
            container.innerHTML = ""; // Limpa o container
            lista.forEach(livro => {
                const mensagem = encodeURIComponent(`Olá Beatriz! Tenho interesse no livro: ${livro.titulo}`);
                const linkWhatsapp = `https://wa.me/5535984278427?text=${mensagem}`;

                const card = `
                    <div class="book-card bg-white rounded-2xl overflow-hidden flex flex-col">
                        <div class="card-img-container cursor-zoom-in" onclick="abrirImagem('${livro.imagem}')">
                            <img src="${livro.imagem}" alt="${livro.titulo}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-6 flex-grow flex flex-col">
                            <span class="text-emerald-600 text-xs font-bold uppercase tracking-widest mb-1">${livro.autor}</span>
                            <h2 class="text-xl font-bold mb-3 leading-tight h-14 overflow-hidden text-gray-800">${livro.titulo}</h2>
                            <div class="bg-emerald-50 p-2 rounded-lg mb-4">
                                <p class="text-emerald-800 text-xs italic"><strong>Estado:</strong> ${livro.estado || 'Bom estado'}</p>
                            </div>
                            <div class="mt-auto">
                                <p class="price-tag mb-4">R$ ${livro.preco}</p>
                                <a href="${linkWhatsapp}" target="_blank" class="btn-whatsapp block text-center w-full py-3 rounded-xl text-white font-bold shadow-lg shadow-emerald-200">
                                    Tenho interesse
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function abrirImagem(url) {
            const modal = document.getElementById('modal-imagem');
            document.getElementById('imagem-ampliada').src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharImagem() {
            document.getElementById('modal-imagem').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Inicia o carregamento quando a página abre
        carregarLivros();
    </script>
</body>
</html>
